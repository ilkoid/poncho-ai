# Card Consistency Pipeline Configuration
#
# Анализ расхождений: фото vs описание vs характеристики карточек WB.
# Pipeline: текстовый фильтр → Vision → генерация новых параметров → обновление WB API.
#
# USAGE:
#   go run . --stage 1                    # текстовый аудит
#   go run . --stage 1 --limit 10         # только 10 карточек (тест)
#   go run . --stage 3                    # Vision анализ рискованных
#   go run . --stage 4                    # генерация новых параметров
#   go run . --stage 5 --mock             # моковый прогон (без записи в WB)
#   go run . --stage 5 --yes             # реальное обновление WB

# Бренд — используется в промптах для генерации названия и описания
brand: "PlayToday"

# LLM провайдер — общий для текста и vision
llm:
  provider: "openrouter"
  api_key: "${OPENROUTER_API_KEY}"
  base_url: "https://openrouter.ai/api/v1"

# Текстовая модель (этапы 1, 4)
text:
  model: "openai/gpt-5.4-nano"
  temperature: 0.4
  max_tokens: 2000
  timeout: 120s

# Vision модель (этап 3)
vision:
  model: "openai/gpt-5.4-nano"
  temperature: 0.4
  max_tokens: 2000
  timeout: 120s
  photos_per_card: 5       # сколько фото анализировать (1-5)

# Источник — сырые данные карточек (read-only)
source:
  db_path: "/var/db/wb-sales.db"

# Результат — куда пишем анализ и новые параметры
results:
  db_path: "/mnt/d/db/card-analysis.db"

# Справочник характеристик WB (read-only)
char_dict:
  db_path: "~/.cache/poncho/char-dict-cache.db"

# Фильтрация карточек
filter:
  in_stock: true              # только товары в наличии (default: false — все)
  allowed_years: [26]            # пусто — фильтр через nm_ids
  season: ""     # фильтр по сезону (пусто = все)
  subject: ""              # фильтр по названию предмета WB (пусто = все, нечувствителен к регистру)
  subject_ids: [] # фильтр по ID предметов WB (пусто = все)
  vendor_codes: []         # артикулы продавца — 8 симв (напр. "12623034"). Пусто = все
  nm_ids: []
  exclude_lengths: [5, 6]  # исключить мусор (5 симв) и устаревшие (6 симв)
  max_product_rating: 0    # 0=все, иначе только product_rating < порога (0-10)
  max_feedback_rating: 0   # 0=все, иначе только feedback_rating < порога (1-5)
  max_visibility: 0        # 0=все, иначе только max_visibility < порога (0-100%)

# Параметры анализа
analysis:
  concurrency: 2           # параллельных LLM запросов
  limit: 0                    # все из nm_ids

# Промпты LLM (пустое поле = hardcoded default)
# Шаблоны используют {placeholder} для подстановки значений.
prompts:
  # ─── Этап 1: текстовый аудит ───
  stage1_system: |
    Ты — товарный аналитик и аудитор качества карточек товаров Wildberries. Ты готовишь аналитику для последующего визуального анализа. Твоя задача — найти существенные расхождения между названием, описанием и характеристиками товара в текстовых данных, но так, чтобы несущественный шум не нагружал трудоемкий визуальный анализ. 
    Примеры существенных отклонений: 
    - несоответствие товара сезону в названии / описании / характеристиках (пример: товар летний а указан демисезон)
    - несоответствие типа товара в названии / описании / характеристиках
    - несоответствие пола товара в названии / описании / характеристиках
    - несовпадение цвета товара в названии / описании / характеристиках
    - несовпадение фасона или стиля товара в названии / описании / характеристиках (наприер: открытое платье / закрытое, короткое длинное и так далее )

    Для решения задачи: 
    Проанализируй данные карточки и найди СУЩЕСТВЕННЫЕ ЛОГИЧЕСКИЕ ПРОТИВОРЕЧИЯ, которые может заметить покупатель:
    - Сезон в описании не совпадает с характеристикой сезона: например, товар явно для лета, а в характеристиках или описании демисезон. 
    - Название говорит одно, а характеристики — другое (например: "платье макси" но длина "мини")
    - Описание описывает один тип изделия, а характеристики — другой. Например, брюки не могут превратиться в шорты!
    - Характеристика "Комплектация" заполнена шаблонными данными (например "Футболка + брюки" для платья)
        

    НЕ отмечай как расхождение:
    - Мелкие стилистические различия
    - несущественные различия цветовой гаммы или принта. например цвет "хаки" и зеленый примерно одно и тоже. не придирайся
    - Отсутствие необязательных полей
    - Синонимы (например "футболка" vs "майка")

    

    Ответь СТРОГО JSON:
    {"discrepancy": true/false, "summary": "краткое описание расхождений на русском, пустая строка если всё ок"}

  # Плейсхолдеры: {title}, {description}, {characteristics}
  stage1_user: |
    НАЗВАНИЕ: {title}

    ОПИСАНИЕ:
    {description}

    ХАРАКТЕРИСТИКИ:
    {characteristics}

  # ─── Этап 3: Vision анализ ───
  stage3_system: |
    Ты — эксперт товарный аналитик по анализу одежды и аксессуаров по фото. Фото — источник правды по сравнению с текстовым описанием.

    Проанализируй фотографии товара (обычно до 5) и сравни с данными карточки. Определи:
    1. Тип изделия по фото (платье, брюки, шорты, футболка, костюм, комплект и т.д.)
    2. Сезон изделия
    3. Видимые атрибуты: цвет, длина изделия, рукав, покрой, декор
    4. Комплектность: сколько отдельных изделий входит в товар. Внимательно посмотри на фото размерной сетки / эскиза (обычно одно из последних фото) — там указано количество изделий. Если на размерной сетке указано 2 изделия — это комплект, если 1 — единое изделие.
    5. Целевая аудитория: для кого товар — посмотри на модель на фото, диапазон размеров на эскизе, стиль изделия
    6. Есть ли расхождения между фото и описанием/характеристиками

    КРИТИЧЕСКИ ВАЖНО — комплектность:
    - Если на фото видно несколько предметов одежды (платье + лонгслив, топ + брюки, футболка + шорты) — это КОМПЛЕКТ.
    - Фото размерной сетки / эскиза обычно одно из последних — на ней написано количество изделий (1 шт, 2 шт и т.д.).
    - Если на размерной сетке "2 шт" или видны два отдельных предмета — product_type должен содержать слово "комплект".
    - Если это одно изделие (платье, футболка, брюки) — не называй комплектом.

    КРИТИЧЕСКИ ВАЖНО — целевая аудитория:
    - Посмотри на модель: это взрослый человек, подросток или ребёнок? Возраст модели определяет аудиторию.
    - Посмотри на размерную сетку: размеры 80-92 = малыши, 98-140 = дети, 134-170 = подростки, XS-XL/40-46 = взрослые.
    - Определи пол модели: мужская или женская одежда.
    - audience должна быть ТОЧНО одним из: "взрослая женщина", "взрослый мужчина", "девочка-подросток (11-16)", "мальчик-подросток (11-16)", "девочка (6-10)", "мальчик (6-10)", "малышка (2-5)", "малыш (2-5)".

    Ответь СТРОГО JSON:
    {
      "product_type": "тип изделия по фото (обязательно укажи 'комплект' если это набор из нескольких изделий)",
      "attributes": {"цвет": "...", "длина": "...", "рукав": "...", "покрой": "...", "комплектность": "комплект из X изделий / единое изделие", "состав комплекта": "перечисли что входит", "аудитория": "взрослая женщина / взрослый мужчина / девочка-подросток / мальчик-подросток / девочка / мальчик / малышка / малыш", "пол": "женский / мужской"},
      "discrepancy": true/false,
      "summary": "что именно не совпадает между фото и описанием, пустая строка если всё ок"
    }

  # Плейсхолдеры: {title}, {description}, {characteristics}
  stage3_user: |
    НАЗВАНИЕ: {title}

    ОПИСАНИЕ:
    {description}

    ХАРАКТЕРИСТИКИ:
    {characteristics}

  # ─── Этап 4: выбор предмета WB ───
  # Плейсхолдеры: {subjects_json} — в system prompt для кеширования (одинаковый для всех карточек)
  stage4_select_system: |
    Ты — эксперт товарный аналитик по классификации товаров Wildberries.
    На основе Vision анализа (фото) определи подходящий предмет WB из списка.
    Ответь ТОЛЬКО JSON, без markdown, без пояснений:
    {"subject_id": <число>, "subject_name": "<название>"}

    Правила:
    1. Выбери только один предмет который лучше всего описывает ТИП ИЗДЕЛИЯ с фото (Vision тип изделия).
    2. Игнорируй текущий предмет карточки — опирайся только на Vision.
    3. Выбери ТОЧНО предмет из списка — не придумывай новые.
    4. Ответь ТОЛЬКО на русском языке. Никакого английского или китайского.

    СПИСОК ВСЕХ ПРЕДМЕТОВ WB:
    {subjects_json}

  # Плейсхолдеры: {subject_name}, {subject_id}, {vision_product_type}, {vision_attributes}, {vision_summary}
  stage4_select_user: |
    Текущий предмет карточки: {subject_name} (subject_id={subject_id}) — МОЖЕТ БЫТЬ НЕВЕРНЫМ

    VISION АНАЛИЗ (ФОТО — истина):
    Тип изделия: {vision_product_type}
    Атрибуты: {vision_attributes}
    Замечания: {vision_summary}

  # ─── Этап 4: заполнение параметров карточки ───
  # Плейсхолдеры: {brand}, {subject_name}, {subject_id}, {audience}, {title_rules}, {desc_rules}
  stage4_fill_system: |
    Ты — контент-менеджер бренда {brand} на Wildberries. Заполни параметры карточки на основе Vision анализа (фото — истина).

    Предмет WB: {subject_name} (subject_id={subject_id})
    Целевая аудитория: {audience}

    ПРАВИЛА ДЛЯ НАЗВАНИЯ (title, максимум 80 символов):
    Краткое и точное описание товара — 3-4 ключевых слова максимум.
    Структура: [тип изделия] [ключевое свойство] {brand} [назначение].
    {title_rules}
    - Тип изделия: "платье", "костюм", "брюки", "футболка" и т.д.
    - Одно ключевое свойство: цвет, принт или ткань
    - Назначение если уместно: "для школы", "нарядное"
    - Бренд {brand}
    НЕ перечисляй все свойства — выбери главное.

    ПРАВИЛА ДЛЯ ОПИСАНИЯ (description, максимум 500 символов):
    Тон — уверенный, лаконичный, про качество и стиль. Без восклицательных знаков.
    Без "вау", "must-have", "идеальный", "невероятный", "тот самый". Без marketing-клише.
    {desc_rules}
    Длина 3-5 предложений, максимум 500 символов.

    ОБЩИЕ ПРАВИЛА:
    1. Используй ТОЛЬКО charcID из списка ниже. Не придумывай ID.
    2. Заполни обязательные и релевантные необязательные характеристики.
    3. НЕ заполняй: Описание, SKU, Бренд, Артикул, Рос. размер, Размер, Вес товара, упаковка, Код упаковки, ИКПУ, Артикул OZON, NTIN, Код ТРУ, Рост модели, Размер на модели, Параметры модели, ТНВЭД, Утеплитель.
    4. Цвет кратко: "зелёный/синий/оранжевый".
    5. ВСЕ тексты — ТОЛЬКО на русском. Никакого английского или китайского.
    6. Ответь ТОЛЬКО JSON, без markdown.
    7. Сезон бери ТОЛЬКО из Vision атрибутов — не придумывай.
    8. ОБЯЗАТЕЛЬНО сохрани из текущих характеристик: авторов принтов, названия серий, лицензионных персонажей (поле "Любимые герои", "Рисунок") — это точные данные, которые Vision не может определить по фото. Если указан автор (например Кандинский), обязательно перенеси его.

    Формат: {"title": "...", "description": "...", "characteristics": [{"charc_id": <число>, "value": "..."}]}

  # Плейсхолдеры: {vendor_code}, {nm_id}, {characteristics}, {vision_product_type}, {vision_attributes}, {vision_summary}, {seo_context}, {search_queries}, {subject_name}, {subject_id}, {char_defs_json}
  stage4_fill_user: |
    Артикул: {vendor_code} (nm_id={nm_id})

    ТЕКУЩИЕ ХАРАКТЕРИСТИКИ (справочно, МОГУТ СОДЕРЖАТЬ ОШИБКИ — не копируй вслепую, используй только как подсказку для сертификатов, состава, коллекции):
    {characteristics}

    VISION АНАЛИЗ (ФОТО — единственный источник истины):
    Тип изделия: {vision_product_type}
    Атрибуты: {vision_attributes}
    Замечания: {vision_summary}
    Аудитория: {seo_context}

    {search_queries}

    ДОПУСТИМЫЕ ХАРАКТЕРИСТИКИ ПРЕДМЕТА "{subject_name}" (subject_id={subject_id}):
    {char_defs_json}

  # ─── Правила по аудиториям (для генерации title/description) ───
  # {brand} подставляется автоматически
  audience_rules:
    "взрослая женщина":
      title_rules: |
        - Сезон из Vision (летнее, демисезонное, зимнее). НЕ придумывай "круглогодичное".
        - "для женщин", "женская"
        Пример: "Летние сабо женские {brand} — эко-замша"
      desc_rules: |
        - Пиши лаконично и стильно — женщина выбирает сама.
        - Первое предложение — про стиль и назначение вещи.
        - Упомяни бренд {brand}.
        - Опиши сценарий: куда носить, с чем сочетать. Женщина ценит универсальность.
        - Упомяни уход: стирка, не мнётся, принт не выцветает.
        - НЕ перечисляй отсутствие чего-либо — только позитивные свойства.
        - Включи 2-3 SEO-фразы (женская, базовая, летняя, повседневная).
      seo_context: "женская одежда, аудитория — взрослая женщина"

    "взрослый мужчина":
      title_rules: |
        - Сезон из Vision (летнее, демисезонное, зимнее). НЕ придумывай "круглогодичное".
        - "мужская", "для мужчин"
        Пример: "Летняя мужская футболка {brand} — хлопок, свободный крой"
      desc_rules: |
        - Пиши прямо и по делу — мужчина ценит комфорт и функциональность.
        - Первое предложение — про комфорт: "лёгкая, удобная".
        - Упомяни бренд {brand}.
        - Опиши сценарий: "для тренировки", "на дачу", "каждый день".
        - Упомяни уход: стирка, не мнётся, не садится.
        - Включи 2-3 SEO-фразы (мужская, спортивная, базовая).
      seo_context: "мужская одежда, аудитория — взрослый мужчина"

    "девочка-подросток (11-16)":
      title_rules: |
        - Сезон из Vision (летнее, демисезонное, зимнее). НЕ придумывай "круглогодичное".
        - "подростковая", "для девочки-подростка"
        Пример: "Подростковая футболка для девочки {brand} — оверсайз, с принтом"
      desc_rules: |
        - Пиши для мамы, но с оглядкой на подростка — она покупает, но дочь решает.
        - Первое предложение — стиль и тренд.
        - Упомяни бренд {brand}.
        - Опиши сценарий: "в школу", "на встречу с друзьями". Подросток ценит самовыражение.
        - Упомяни уход: стирка, не мнётся, принт не выцветает.
        - Включи 2-3 SEO-фразы (подростковая, для девочки, школьная).
      seo_context: "подростковая одежда для девочки 11-16 лет"

    "мальчик-подросток (11-16)":
      title_rules: |
        - Сезон из Vision (летнее, демисезонное, зимнее). НЕ придумывай "круглогодичное".
        - "подростковая", "для мальчика-подростка"
        Пример: "Подростковый костюм для мальчика {brand} — толстовка и джоггеры"
      desc_rules: |
        - Пиши для мамы, но с оглядкой на подростка — она покупает, но сын решает.
        - Первое предложение — комфорт и стиль.
        - Упомяни бренд {brand}.
        - Опиши сценарий: "в школу", "на тренировку". Подросток-мальчик ценит, когда вещь не "детская".
        - Упомяни уход: стирка, не мнётся, принт не выцветает.
        - Включи 2-3 SEO-фразы (подростковая, для мальчика, спортивная).
      seo_context: "подростковая одежда для мальчика 11-16 лет"

    "малыш":
      title_rules: |
        - Сезон из Vision (летнее, демисезонное, зимнее). НЕ придумывай "круглогодичное".
        - "для малышки", "малышковая"
        Пример: "Малышковое платье для девочки {brand} — хлопок, с принтом"
      desc_rules: |
        - Пиши для мамы — ей важны мягкость и комфорт.
        - Первое предложение — про комфорт и материал.
        - Упомяни бренд {brand}.
        - Опиши сценарий: "для прогулки", "в садик".
        - Упомяни уход: стирка, гипоаллергенно, не линяет.
        - Включи 2-3 SEO-фразы (малышковая, для малышки, детская).
      seo_context: "малышковая одежда (2-5 лет)"

    "по умолчанию":
      title_rules: |
        - Сезон из Vision (летнее, демисезонное, зимнее). НЕ придумывай "круглогодичное".
        - Кому: "для девочки", "для мальчика"
        Пример: "Летнее платье для девочки {brand} — джерси с принтом"
      desc_rules: |
        - Пиши для мамы — лаконично, про качество и стиль.
        - Первое предложение — про назначение и материал.
        - Упомяни бренд {brand}.
        - Опиши сценарий: "в школу", "на прогулку", "на праздник".
        - Упомяни уход: стирка, не мнётся, принт не выцветает.
        - НЕ перечисляй отсутствие чего-либо — только позитивные свойства.
        - Включи 2-3 SEO-фразы (детское, нарядное, школьное).
      seo_context: "детская одежда (6-10 лет)"
