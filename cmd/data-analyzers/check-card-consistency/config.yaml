# Card Consistency Pipeline Configuration
#
# Анализ расхождений: фото vs описание vs характеристики карточек WB.
# Pipeline: текстовый фильтр → Vision → генерация новых параметров → обновление WB API.
#
# USAGE:
#   go run . --stage 1                    # текстовый аудит
#   go run . --stage 1 --limit 10         # только 10 карточек (тест)
#   go run . --stage 3                    # Vision анализ рискованных
#   go run . --stage 4                    # генерация новых параметров
#   go run . --stage 5 --mock             # моковый прогон (без записи в WB)
#   go run . --stage 5 --yes             # реальное обновление WB

# Бренд — используется в промптах для генерации названия и описания
brand: "PlayToday"

# LLM провайдер — общий для текста и vision
llm:
  provider: "openrouter"
  api_key: "${OPENROUTER_API_KEY}"
  base_url: "https://openrouter.ai/api/v1"

# Текстовая модель (этапы 1, 4)
text:
  model: "openai/gpt-5.4-nano"
  temperature: 0.2
  max_tokens: 2000
  timeout: 120s

# Vision модель (этап 3)
vision:
  model: "openai/gpt-5.4-nano"
  temperature: 0.2
  max_tokens: 2000
  timeout: 120s
  photos_per_card: 5       # сколько фото анализировать (1-5)

# Источник — сырые данные карточек (read-only)
source:
  db_path: "/var/db/wb-sales.db"

# Результат — куда пишем анализ и новые параметры
results:
  db_path: "/mnt/d/db/card-analysis.db"

# Справочник характеристик WB (read-only)
char_dict:
  db_path: "~/.cache/poncho/char-dict-cache.db"

# Фильтрация карточек
filter:
  allowed_years: [26]            # пусто — фильтр через nm_ids
  season: ""     # фильтр по сезону (пусто = все)
  subject: ""              # фильтр по названию предмета WB (пусто = все, нечувствителен к регистру)
  subject_id: 0            # фильтр по ID предмета WB (0 = все)
  vendor_codes: []         # артикулы продавца — 8 симв (напр. "12623034"). Пусто = все
  nm_ids: []
  exclude_lengths: [5, 6]  # исключить мусор (5 симв) и устаревшие (6 симв)

# Параметры анализа
analysis:
  concurrency: 2           # параллельных LLM запросов
  limit: 0                    # все из nm_ids
