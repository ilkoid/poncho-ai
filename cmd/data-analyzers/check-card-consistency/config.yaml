# Card Consistency Pipeline Configuration
#       - если какая-то характеристика не может быть определена по фото или из описания товара, пропускай её, не придумывай сам, не предполагай#
# Анализ расхождений: фото vs описание vs характеристики карточек WB.
# Pipeline: текстовый фильтр → Vision → генерация новых параметров → обновление WB API.
#
# USAGE:
#   go run . --stage 1                    # текстовый аудит
#   go run . --stage 1 --limit 10         # только 10 карточек (тест)
#   go run . --stage 3                    # Vision анализ рискованных
#   go run . --stage 4                    # генерация новых параметров
#   go run . --stage 5 --mock             # моковый прогон (без записи в WB)
#   go run . --stage 5 --yes             # реальное обновление WB

# Бренд — используется в промптах для генерации названия и описания
#brand: "PlayToday"

# LLM провайдер — общий для текста и vision
llm:
  provider: "openrouter"
  api_key: "${OPENROUTER_API_KEY}"
  base_url: "https://openrouter.ai/api/v1"

# Текстовая модель (этапы 1, 4)
text:
#  model: "openai/gpt-5.4-nano"
  model: "google/gemini-3-flash-preview"
  temperature: 0.3
  max_tokens: 9000
  timeout: 120s

# Vision модель (этап 3)
vision:
  model: "google/gemini-3-flash-preview"
  temperature: 0.3
  max_tokens: 9000
  timeout: 120s
  photos_per_card: 5       # сколько фото анализировать (1-5)

# Источник — сырые данные карточек (read-only)
source:
  db_path: "/var/db/wb-sales.db"

# Результат — куда пишем анализ и новые параметры
results:
  db_path: "/mnt/d/db/card-correction-final.db"

# Справочник характеристик WB (read-only)
char_dict:
  db_path: "~/.cache/poncho/char-dict-cache.db"

# Фильтрация карточек — Аксессуары ВЛ26 (174 карточки)
filter:
  # in_stock: false           # только товары в наличии
  allowed_years: []
  exclude_lengths: [5, 6]  # исключить мусор (5 симв) и устаревшие (6 симв)
  seasons: []
  subject: ""
  subject_ids: []
  vendor_codes: []

  nm_ids: [147845283, 152075947, 152075952, 147926969, 210903883, 330012700, 316309538, 316309526, 343407463, 354941130, 316309559, 316208342, 332017370, 316309530, 354941109, 316309533, 316309562, 329961501, 369562466, 317263796, 330012696, 738700640, 738700642, 738700625, 738700629, 738700573, 738700576, 740188233, 740188258, 740051756, 740051786, 740051781, 738700645, 738700644, 738700647, 748960178, 740051784, 740051800, 740051727, 740051808, 740262875, 740262820, 746839287, 746839317, 746839417, 740051737, 740051771, 740051782, 740051744, 740188226, 740188271, 740188276, 740188245, 740262827, 740051742, 740051741, 748960221, 738702649, 738700589, 738702634, 738702627, 738702683, 738702670, 738700653, 738706932, 738702630, 738702693, 738702708, 738702703, 738700601, 738700605, 738700609, 738700632, 738700596, 740188256, 740188295, 738702659, 738700637, 738700604, 740051787, 740051785, 740051789, 740051753, 740051747, 740051738, 740188261, 740051768, 740051758, 740051795, 740051745, 740188287, 740188294, 740051772, 740051783, 740051788, 748960237, 738702646, 740051760, 740051769, 740051740, 740051791, 740051780, 740051770, 740262878, 740262884, 740262836, 740262843, 740262821, 740263235, 740263233, 740262858, 740262847, 746839270, 746839333, 746839346, 740051748, 740051792, 740051750, 740051799, 740051803, 740051801, 740051733, 740051720, 740051752, 748960265, 740051793, 740051754, 740051731, 740051773, 740051798, 738700585, 738671269, 740188270, 740188298, 738700602, 738700628, 738700616, 738700611, 738700635, 740051797, 740262868, 740051777, 740051778, 740051802, 740051751, 740051734, 740051736, 738671271, 740188299, 740188273, 746839365, 746839385, 746839396, 740052018, 740188286, 740051805, 740051766, 740051796, 740051759, 740052009, 738700591, 740051730, 740051757, 740051776, 740051735, 746839406, 746839269, 740188309, 738700593, 738700619, 738700641, 738700623]
  # Пороги "проблемных" с точки зрения воронки карточек
#  max_product_rating: 8.0  # берем карточки с плохим качеством/упаковкой WB
#  max_feedback_rating: 4.2 # берем карточки, на которые жалуются клиенты
#  max_visibility: 0.0     # берем карточки, которые видны менее чем в 50% поисковых запросов
  
  # Фильтрация по статусам нашего пайплайна (для повторных прогонов)
  problems:
    any_discrepancy: false
    has_parse_errors: false
    pending_wb_update: false

# Параметры анализа
analysis:
  concurrency: 3           # параллельных LLM запросов
  limit:                  # все из nm_ids

# Stage 5: WB API update settings (production rate limits from Swagger)
wb_update:
  api_key: "${WB_API_CONTENT_KEY}"    # WB Content API ключ. Пусто = autodetect WB_API_KEY → WB_API_ANALYTICS_AND_PROMO_KEY
  batch_size: 50             # карточек на один API-запрос (макс 3000, 50 — безопасно)
  rate_per_min: 10           # запросов/мин (Swagger: 10 req/min для POST /content/v2/cards/update)
  rate_burst: 5              # burst для rate limiter
  api_floor_per_min: 10      # безопасный минимум после 429 (Swagger: 10)
  api_floor_burst: 5         # безопасный burst после 429
  adaptive_probe_after: 10   # OK-ответов до возврата к желаемой скорости
  max_backoff_seconds: 60    # максимальный экспоненциальный откат на 429

# Защищённые характеристики — Stage 5 не перезаписывает их LLM-значениями.
# Оставляет текущее значение из карточки как есть.
protected_char_ids:
  - 204557   # Пол (WB rejects incorrect gender values)
  - 15000001  # ТНВЭД
  - 15001650  # ИКПУ
  - 14177452  # Описание
  - 14177453  # SKU/Артикул продавца
  - 14177446  # Бренд
  - 54337     # Размер
  - 88952     # Вес товара с упаковкой
  - 15001136  # Номер сертификата соответствия
  - 15001137  # Дата регистрации сертификата/декларации
  - 15001138  # Дата окончания действия сертификата/декларации
  - 15001135  # Номер декларации соответствия
  - 15003293  # Артикул OZON
  - 15003988  # NTIN
  - 15003991  # количество штук в товаре по ЭС
  - 15003989  # Код ТРУ 1
  - 15003990  # Код ТРУ 2
  - 14177453  # SKU
  - 14177451  # Страна производства
  - 15001405  # Ставка НДС

# Промпты LLM (пустое поле = hardcoded default)
# Шаблоны используют {placeholder} для подстановки значений.
prompts:
  # ─── Этап 1: Единый аудит (Текст + Фото) ───
  stage1_system: |
    Ты — товарный аналитик по анализу карточек Wildberries.

    Твоя задача — проанализировать фотографии товара, его описание и сравнить со списком характеристик.
    Найди расхождения между тем, что видно на фото/описании, и текущими значениями характеристик.

    Характеристики переданы как JSON-массив: [{"id": 12345, "name": "Цвет", "value": "красный"}, ...].
    Каждый элемент содержит числовой ID поля (charc_id), его название и текущее значение.

    Определи:
    1. Тип изделия (одно значение)
    2. Сезон (одно значение; если в описании "весна-лето" или "демисезон" — приоритет лету). ВНИМАНИЕ: поле "Коллекция" (например "Весна-Лето 2025") — это НЕ сезон, это брендовая коллекция. НЕ предлагай менять коллекцию на "лето".
    3. Видимые атрибуты по фото (цвет доминирующий первый, длина, рукав, покрой, декор, фактура, застёжка и т.д.)
    4. Рисунок (одно значение). Это важная деталь для буста продаж, если есть рисунки это важно подчеркнуть. Но выбрать как значение можно только один рисунок
    5. Особенности модели (интересные декоративные элементы, особенности обуви, выделяющиеся функциональные элементы) бери и из фото и из описания. Если есть рисунки выбери основной, он может быть только один в поле Рисунок
    6. Назначение модели - важная характеристика для аксессуаров (сумок, брелков, ремней, косметичек). Для летних товаров используй слово "летняя" (например: "летняя", "летняя повседневная").
    7. Комплектность (посмотри размерную сетку — кол-во изделий: 2 шт = комплект)
    8. Целевую аудиторию по модели и размерам (80-92 = малыши, 98-140 = дети, 134-170 = подростки, XS-XL = взрослые)

    ПОШАГОВАЯ проверка КАЖДОЙ характеристики:
    - Цвет: доминирующий — первый. "белый, красный" ≠ "красный, белый" если красный доминирует. НИКОГДА не пиши "мультиколор", "разноцветный", "многоцветный" — только конкретные цвета через запятую.
    - Материал верха: если есть в описании то надо вывести, это важный параметр. Не выдумывай его, если не найден
    - Пол: АБСОЛЮТНЫЙ ЗАПРЕТ на изменение. Значения "Девочки", "Мальчики", "Женский", "Мужской" — все валидны на WB. Никогда не меняй.
    - Миниколлекция: НИКОГДА не добавляй слово "Миниколлекция" в характеристики карточки. Это внутренний термин, не для WB.
    - Пустые характеристики, которые видны по фото/описанию — ошибка заполнения (card_value="(пусто)")
    - Принт = рисунок НА ткани, не декор на лентах/кантовке
    - Если характеристика отсутствует в списке, но её можно определить по фото — добавь issue
    - КРОСС-ПОЛЕВОЕ ОБОГАЩЕНИЕ: если ключевая особенность товара из описания/фото упомянута в одной характеристике, но ОТСУТСТВУЕТ в другой релевантной — это тоже расхождение. Пример: "светодиодные элементы" есть в "Декоративные элементы", но "Особенности обуви" не содержит этой информации — добавь issue с charc_id целевого поля и correct_value с расширенным списком значений.

    КРИТИЧЕСКИ ВАЖНО — идентификация полей:
    - В каждом issue ОБЯЗАТЕЛЬНО указывай "charc_id" из списка характеристик.
    - Если поле не найдено в списке — поставь charc_id: null.
    - Используй ТОЧНОЕ название поля (name) из списка — не придумывай свои названия.

    КРИТИЧЕСКИ ВАЖНО — комплектность:
    - Несколько предметов одежды на фото = КОМПЛЕКТ. Одно изделие = не комплект.

    КРИТИЧЕСКИ ВАЖНО — целевая аудитория:
    - audience ТОЧНО одно из: "взрослая женщина", "взрослый мужчина", "девочка-подросток (11-16)", "мальчик-подросток (11-16)", "девочка (6-10)", "мальчик (6-10)", "малышка (2-5)", "малыш (2-5)".

    НЕ отмечай как расхождение:
    - Синонимы (одинаковые по смыслу значения)
    - Пустые характеристики, которые НЕВОЗМОЖНО определить по фото ИЛИ описанию (состав ткани в %)
    - ВСЕГДА игнорируй системные характеристики: страна производства, код ТНВЭД, вес, размеры товара, сертификаты, коллекция

    -----------------------
    ФОРМАТ ОТВЕТА
    -----------------------

    Верни СТРОГО валидный JSON, без текста вне JSON.

    {
      "category": "clothing | shoes | accessories",
      "product_type": "string",
      "season": "string",
      "attributes": {},
      "discrepancy": true,
      "issues": [
        {
          "charc_id": 18769,
          "field": "Сезон",
          "card_value": "круглогодичный",
          "correct_value": "лето",
          "reason": "на фото летние кроссовки с перфорацией"
        }
      ],
      "summary": "string"
    }

    charc_id — числовой ID из списка характеристик. Если поле не в списке — null.

    Перед отправкой — перепроверь JSON
    избегай: unexpected end of JSON input 
    избегай: json: cannot unmarshal array into Go struct field visionAnalysisResult.attributes of type string


  # ─── Этап 4: выбор предмета WB ───
  # Плейсхолдеры: {subjects_json} — в system prompt для кеширования (одинаковый для всех карточек)
  stage4_select_system: |
    Ты — эксперт товарный аналитик по классификации товаров Wildberries.
    На основе Vision анализа (фото) определи подходящий предмет WB из списка.
    Ответь ТОЛЬКО JSON, без markdown, без пояснений:
    {"subject_id": <число>, "subject_name": "<название>"}

    Правила:
    1. Выбери только один предмет который лучше всего описывает ТИП ИЗДЕЛИЯ с фото (Vision тип изделия).
    2. Игнорируй текущий предмет карточки — опирайся только на Vision.
    3. Выбери ТОЧНО предмет из списка — не придумывай новые.
    4. Ответь ТОЛЬКО на русском языке. Никакого английского или китайского.

    СПИСОК ВСЕХ ПРЕДМЕТОВ WB:
    {subjects_json}

    избегай ошибки: json: cannot unmarshal array into Go struct field charResult.characteristics.value of type string

  # Плейсхолдеры: {subject_name}, {subject_id}, {vision_product_type}, {vision_attributes}, {vision_summary}
  stage4_select_user: |
    Текущий предмет карточки: {subject_name} (subject_id={subject_id}) — МОЖЕТ БЫТЬ НЕВЕРНЫМ

    VISION АНАЛИЗ (ФОТО — истина):
    Тип изделия: {vision_product_type}
    Атрибуты: {vision_attributes}
    Замечания: {vision_summary}

  # ─── Этап 4: исправление характеристик (issues-driven) ───
  # stage4_fill_system/stage4_fill_user УДАЛЕНЫ — pipeline не генерирует title/description.

  # ─── Этап 4: issues-driven генерация характеристик (без title/description) ───
  # Плейсхолдеры: {subject_name}, {subject_id}
  stage4_chars_system: |
    Ты — молчаливый JSON-генератор характеристик товара для Wildberries.
    НАЧНИ ОТВЕТ С { И ЗАКОНЧИ }. НИКАКОГО текста до или после JSON.
    НЕ рассуждай, НЕ объясняй, НЕ пиши markdown.

    Предмет WB: {subject_name} (subject_id={subject_id})

    ПРАВИЛА:
    1. Исправь ТОЛЬКО характеристики из списка ISSUES ниже. НЕ генерируй title или description.
    2. Для каждого issue: возьми suggested как основу и отформатируй значение корректно для WB API.
    3. Используй ТОЛЬКО charc_id из списка допустимых характеристик. Не придумывай ID.
    4. Если issue помечен "is_empty": true — характеристика отсутствует, её нужно добавить.
    5. Если issue помечен "is_empty": false — характеристика заполнена неверно, замени значение.
    6. ВСЕ тексты — ТОЛЬКО на русском. Никакого английского или китайского.
    7. Цвет: перечисляй КОНКРЕТНЫЕ цвета через запятую (доминирующий первый). ЗАПРЕЩЕНО: мультиколор, разноцветный, многоцветный. Пример: "розовый, голубой, желтый".
    8. Пол: НЕ генерируй значение для поля "Пол". Это защищённое поле — пропускай его.
    9. Коллекция: НЕ генерируй значение. "Весна-Лето 2025" — это брендовая коллекция, не сезон.
    10. Назначение: для летних товаров используй слово "летняя" (например: "летняя", "летняя повседневная").
    11. ЗАПРЕЩЕНО использовать слово "Миниколлекция" в любом поле — это внутренний термин, не для WB.

    Формат (строго):
    {"characteristics": [{"charc_id": 12345, "value": "значение"}]}

  # Плейсхолдеры: {vendor_code}, {nm_id}, {vision_product_type}, {vision_attributes}, {issues_structured}, {characteristics}, {subject_name}, {subject_id}, {char_defs_json}
  stage4_chars_user: |
    Артикул: {vendor_code} (nm_id={nm_id})

    VISION АНАЛИЗ (ФОТО — истина):
    Тип изделия: {vision_product_type}
    Атрибуты: {vision_attributes}

    ОПИСАНИЕ ТОВАРА (текстовые особенности для обогащения характеристик):
    {description}

    ISSUES (структурированные расхождения из фото-аудита):
    {issues_structured}

    ТЕКУЩИЕ ЗНАЧЕНИЯ ПРОБЛЕМНЫХ ХАРАКТЕРИСТИК (справочно):
    {characteristics}

    ДОПУСТИМЫЕ ХАРАКТЕРИСТИКИ ПРЕДМЕТА "{subject_name}" (subject_id={subject_id}):
    {char_defs_json}

    ОТВЕТ: только JSON. Начни с {"characteristics":
