# validate-certificates — конфигурация
#
# Проверка сертификатов соответствия через ФГИС РОСАКРЕДИТАЦИИ (pub.fsa.gov.ru).
# Читает номера из onec_goods (read-only), сверяет с реестром ФСА.
#
# Приоритет: CLI флаг > config.yaml > defaults

# ─── Источник данных ───────────────────────────────────────

# Путь к SQLite базе (read-only режим)
db_path: "/var/db/wb-sales.db"

# ─── Фильтрация (pkg/filter.Filter) ────────────────────────
#
# Все поля опциональны. AND между полями, OR внутри списков.
# Пустые/нулевые поля игнорируются.

filters:
  # Конкретные артикулы и nm_id
  vendor_codes: []              # ["12621371", "12621387"]
  nm_ids: []                    # [32311081, 32311123]

  # По артикулу (позиции 2-3 = год производства)
  allowed_years: [26]       # Только 2025-2026
  exclude_lengths: [5, 6]       # Исключить 5-6 значные артикулы
  exclude_vendor_codes: []      # Исключить конкретные артикулы
  vendor_code_prefix: ""        # Первая цифра артикула (напр. "1")

  # По предмету WB
  subject: ""                    # Точное совпадение (напр. "Кроссовки")
  subject_ids: []               # WB subject IDs
  seasons: []                   # Сезон из характеристик (напр. ["зима"])

  # По остаткам
  in_stock: false               # Только товары с остатками на складе

  # По 1C категориям
  onec_type: []                 # ["Обувь", "Одежда", "Аксессуары"]
  category_level1: []           # ["Женская", "Мужская"]
  category_level2: []           # ["Кроссовки", "Ботинки"]

  # По статусу в 1C
  active_only: false            # Исключить заблокированные артикулы

# ─── Лимиты ────────────────────────────────────────────────

# Максимум записей для обработки (0 = все)
limit: 0

# ─── Анти-детекция ─────────────────────────────────────────

# Минимальная задержка между API-запросами (секунды)
delay_min: 1.0

# Максимальная задержка между API-запросами (секунды)
# Реальная задержка = random(delay_min, delay_max) для каждого запроса
delay_max: 4.0

# ─── Браузер ───────────────────────────────────────────────

# Путь к Chromium (пустая строка = авто-определение)
# Используется для получения Bearer-токена через headless-режим
chromium_path: "/usr/bin/chromium-browser"

# ─── Экспорт ───────────────────────────────────────────────

# Путь к CSV-файлу для экспорта результатов (пустая строка = без экспорта)
csv: ""

# Путь к XLSX-файлу для экспорта результатов с форматированием (пустая строка = без экспорта)
xlsx: ""
