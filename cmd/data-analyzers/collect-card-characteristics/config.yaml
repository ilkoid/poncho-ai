# collect-card-characteristics — конфигурация
#
# Сбор исторических характеристик WB по всем предметам (subject_name).
# Читает из wb-sales.db (read-only), выгружает в XLSX.
# Каждый лист = предмет WB, строки = характеристики, значения через запятую с дедупликацией.
#
# Приоритет: CLI флаг > config.yaml > defaults

# ─── Источник данных ───────────────────────────────────────

# Путь к SQLite базе (read-only режим)
db_path: "/var/db/wb-sales.db"

# ─── Фильтрация (pkg/filter.Filter) ────────────────────────
#
# Все поля опциональны. AND между полями, OR внутри списков.
# Пустые/нулевые поля игнорируются.

filters:
  # Конкретные артикулы и nm_id
  vendor_codes: []              # ["12621371", "12621387"]
  nm_ids: []                    # [32311081, 32311123]

  # По артикулу (позиции 2-3 = год производства)
  allowed_years: [24, 25, 26]  # Года из vendor_code
  exclude_lengths: [5, 6]           # Исключить артикулы указанной длины
  exclude_vendor_codes: []      # Исключить конкретные артикулы
  vendor_code_prefix: ""        # Первая цифра артикула (напр. "1")

  # По предмету WB
  subject: ""                   # Точное совпадение (напр. "Кроссовки")
  subject_ids: []               # WB subject IDs (узнать через --list-subjects)
  seasons: []                   # Сезон из характеристик (напр. ["зима"])

  # По остаткам
  in_stock: false               # Только товары с остатками на складе

  # По 1C категориям
  onec_type: []                 # ["Обувь", "Одежда", "Аксессуары"]
  category_level1: []           # ["Женская", "Мужская"]
  category_level2: []           # ["Кроссовки", "Ботинки"]

  # По статусу в 1C
  active_only: false            # Исключить заблокированные артикулы

# ─── Экспорт ───────────────────────────────────────────────

# Путь к XLSX-файлу для выгрузки результатов
output: "./characteristics_report.xlsx"

# Пакетный экспорт (--export-all): разбить предметы на несколько XLSX файлов
# Каждый файл автономен: сводка + листы предметов с гиперссылками
export_all: false
items_per_file: 30          # предметов на один XLSX файл
