# fix-card-dimensions configuration
#
# Обновление весо-габаритных характеристик карточек WB из данных 1С WMS.
# Workflow:
#   --import-xls file.xlsx --db /var/db/wb-sales.db   # импорт XLS → onec_dimensions
#   --stage --config config.yaml                       # анализ + staging
#   --diff --config config.yaml                        # before/after
#   --check --config config.yaml                       # проверить ошибки WB
#   --apply --dry-run --config config.yaml             # проверить payload
#   --apply --config config.yaml                       # отправить в WB API

db_path: "/var/db/wb-sales.db"

# Фильтрация карточек (pkg/filter). Все поля опциональны, AND между полями, OR внутри списков.
filters:
  nm_ids: []                  # Конкретные nm_id (для теста на 1 карточке)
  vendor_codes: [] # ["32231102", "32311053", "32411021", "32431011", "32431012"]  # Артикулы продавца — 8 симв (пусто = все)
  allowed_years: [23,24,25,26]           # Год из позиций 2-3 vendor_code (26 = 2026). Пусто = все
  exclude_lengths: [5, 6]     # Исключить артикулы указанной длины
  exclude_vendor_codes: []    # Исключить конкретные артикулы
  # vendor_code_prefix: "1"  # Первая цифра артикула
  subject: ""                 # Точное совпадение subject_name (case-insensitive)
  subject_ids: []             # WB subject IDs
  seasons: []                 # Сезон из card_characteristics
  in_stock: true             # Только с остатками
  # onec_type: ["Обувь"]     # 1C тип (Обувь/Одежда/Аксессуары)
  # category_level1: ["Женская"] # 1C категория L1
  # category_level2: ["Кроссовки"] # 1C категория L2
  # active_only: true        # Исключить заблокированные в 1C

# Compare mode: сравнение габаритов WB vs 1C (--compare)
compare:
  tolerance_cm3: 100      # cm³ — карточки с дельтой объёма больше этого порога показываются
  tolerance_kg: 0.05       # кг — карточки с дельтой веса больше этого порога показываются

# WB API update settings
wb_update:
  batch_size: 50                     # карточек на один API-запрос
  rate_per_min: 8                    # запросов/мин (желаемая скорость)
  rate_burst: 2                      # burst для rate limiter
  api_floor_per_min: 5               # безопасный минимум после 429
  api_floor_burst: 1                 # burst после 429
  adaptive_probe_after: 10           # OK-ответов до возврата к желаемой скорости
  max_backoff_seconds: 60            # максимальный экспоненциальный откат на 429
  interval_seconds: 8                # пауза между батчами (сек)
