# Reference date для проверки истечения сертификатов (DD.MM.YYYY или YYYY-MM-DD).
# Сертификаты с certificate_end раньше этой даты пропускаются.
# Default: сегодня. Можно переопределить через --date.
reference_date: "27.05.2026"

# WB Content API (POST /content/v2/cards/update, swagger: 100/min burst 5)
wb_update:
  batch_size: 40             # Карточек на один API-запрос
  rate_per_min: 8            # Желаемый rate (req/min)
  rate_burst: 2              # Burst для rate limiter
  api_floor_per_min: 5       # Recovery floor после 429 (req/min)
  api_floor_burst: 1         # Burst для api floor
  interval_seconds: 8        # Пауза между батчами (sec)
  # batch_size: 1            # Для отладки — по одной карточке
  # rate_per_min: 5          # Осторожнее — Content API чувствителен
  # interval_seconds: 15     # Больше пауза — мягче rate
