# WB Supplies API configuration
# API: supplies-api.wildberries.ru (FBW Supplies)

wb:
  api_key: ""
  timeout: "60s"

supply:
  # Путь к общей базе данных
#  db_path: "wb-sales-test.db"
  db_path: "/mnt/d/db/wb-sales.db"

  # Период загрузки (days — альтернатива begin/end)
  days: 14
  # begin: ""
  # end: ""

  # Тип фильтра по датам:
  #   updatedDate  — дата изменения поставки (default)
  #   createDate   — дата создания поставки
  #   factDate     — дата фактической отгрузки
  #   supplyDate   — плановая дата отгрузки
  date_filter_type: "updatedDate"

  # Rate limits (two-level adaptive)
  # All supply endpoints share a global per-seller limit of ~30 req/min.
  # Reference data has separate limit: 6 req/min.
  rate_limits:
    # Shared limiter for list/goods/packages/details (global ~30 req/min per seller)
    supply_ops: 25
    supply_ops_burst: 5
    supply_ops_api: 25
    supply_ops_api_burst: 5

    # Справочники (GET /api/v1/warehouses, /api/v1/transit-tariffs) — 6 req/min
    ref: 7
    ref_burst: 5
    ref_api: 7
    ref_api_burst: 5

  # Adaptive tuning
  adaptive_probe_after: 10
  max_backoff_seconds: 60
