wb:
  analytics_api_key: ${WB_API_ANALYTICS_AND_PROMO_KEY}
  timeout: 30m

funnel_aggregated:
  # Периоды (required)
  selected_start: "2026-03-12"
  selected_end: "2026-03-18"

  # Past период для сравнения (optional - раскомментируйте если нужно)
  past_start: "2026-03-05"
  past_end: "2026-03-11"

  # Фильтры (optional - пусто = все товары)
  nm_ids: []
  brand_names: []
  subject_ids: []
  tag_ids: []
  skip_deleted_nm: false

  # Сортировка (optional)
  order_by_field: ""  # openCard, orders, buyouts, etc.
  order_by_mode: "desc"

  # Пагинация
  page_size: 500  # Товаров за запрос (max 1000)

  # Rate limiting (legacy fields - for backwards compatibility)
  rate_limit: 3  # Запросов в минуту (WB Analytics API limit)
  burst: 3

  # Adaptive rate limiting (preferred - use rate_limits instead)
  # Analytics API v3: 3 req/min, burst 3 (very slow!)
  # desired: rate you want (can exceed api — adaptive limiter handles 429)
  # api:      swagger-documented rate (recovery floor after 429)
  rate_limits:
    funnel_aggregated: 3
    funnel_aggregated_burst: 3
    funnel_aggregated_api: 3
    funnel_aggregated_api_burst: 3

  # Adaptive rate limiting tuning (see dev_limits.md)
  # probe_after:   consecutive OKs at api floor before probing desired
  # max_backoff:   cap for cooldown time (seconds)
  adaptive_probe_after: 10
  max_backoff_seconds: 60

  # Хранилище
  db_path: "/home/ilkoid/go-workspace/src/poncho-ai/db/wb-sales.db"
