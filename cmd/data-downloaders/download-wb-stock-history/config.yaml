# WB Stock History CSV Downloader Configuration
# Downloads historical stock data from WB Analytics API via CSV reports

# WB API Settings
wb:
  api_key: "${WB_API_KEY}"
  timeout: "60s"

# Stock History Download Settings
stock_history:
  # Database path (SQLite)
  db_path: "/home/ilkoid/go-workspace/src/poncho-ai/db/wb-sales.db"

  # Date range (alternative to --days flag)
  #begin: "2026-01-01"  # YYYY-MM-DD
  #end: "2026-01-31"    # YYYY-MM-DD

  # Days from today (alternative to begin/end)
  days: 31

  # Report type: "metrics" (monthly) or "daily" (daily stock levels)
  report_type: "daily"

  # Stock type filter: "", "wb", or "mp"
  # "" = all warehouses, "wb" = WB warehouses only, "mp" = seller warehouses only
  stock_type: ""

  # Resume mode: continue from last loaded date
  resume: false

  # Rate limits per endpoint (requests per minute)
  # desired: rate you want (can exceed api — adaptive limiter handles 429)
  # api:      swagger-documented limit (recovery floor after 429)
  # All endpoints: 3 req/min (swagger)
  rate_limits:
    # POST /api/v2/nm-report/downloads (create report)
    create: 3
    create_burst: 3
    create_api: 3
    create_api_burst: 3

    # GET /api/v2/nm-report/downloads (status check)
    status_check: 3
    status_check_burst: 3
    status_check_api: 3
    status_check_api_burst: 3

    # GET /api/v2/nm-report/downloads/file/{id} (download ZIP)
    download: 3
    download_burst: 3
    download_api: 3
    download_api_burst: 3

  # Adaptive rate limiting tuning (see dev_limits.md)
  adaptive_probe_after: 10   # OKs at api floor before probing desired
  max_backoff_seconds: 60    # Cap for exponential backoff

  # Polling configuration (async report generation)
  poll_interval_sec: 30     # Check status every N seconds (default: 30)
  poll_timeout_min: 30      # Give up after N minutes (default: 30)
