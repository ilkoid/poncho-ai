# WB Promotion V2 Downloader Configuration
# Extended promotion data: normquery, bid recommendations, finance, calendar

# WB API Settings
wb:
  api_key: "WB_API_KEY"
  analytics_api_key: "WB_API_ANALYTICS_AND_PROMO_KEY"
  # Calendar API key (dp-calendar-api.wildberries.ru)
  # Falls back to WB_API_MARKET_KEY env var, then to main api_key
  calendar_api_key: "${WB_API_KEY}"
  timeout: 120s

# Promotion V2 Settings
promotion_v2:
  db_path: "/mnt/d/db/wb-promo.db"
  days: 7
  statuses: [9, 11]  # active + paused only

  skip_bids: false
  skip_normquery: false
  skip_recommendations: false
  skip_finance: true
  skip_calendar: true
  skip_budgets: true
  skip_min_bids: true

  # Calendar date range (independent from main 'days' parameter)
  calendar_days_past: 30    # look back N days from today
  calendar_days_future: 30  # look forward N days from today

  rate_limits:
    # Normquery endpoints (POST /adv/v0/normquery/*)
    # Swagger: 5 req/sec = 300/min for list/bids/minus, burst 10
    normquery: 300
    normquery_burst: 10
    normquery_api: 300
    normquery_api_burst: 10

    # Normquery stats (POST /adv/v0/normquery/stats) — much stricter!
    # Swagger: 10 req/min, burst 20 — was burst 1 (20x underutilized)
    normquery_stats: 10
    normquery_stats_burst: 10
    normquery_stats_api: 10
    normquery_stats_api_burst: 10

    # Bid recommendations (GET /api/advert/v0/bids/recommendations)
    # Swagger: 5 req/min, burst 5 — was burst 1
    bid_rec: 5
    bid_rec_burst: 3
    bid_rec_api: 5
    bid_rec_api_burst: 3

    # Finance (balance, payments, expenses)
    # Swagger: 1 req/sec = 60/min
    finance: 60
    finance_burst: 5
    finance_api: 60
    finance_api_burst: 5

    # Calendar (GET /api/v1/calendar/promotions)
    # Swagger: 10 req/6sec ≈ 100/min
    calendar: 100
    calendar_burst: 5
    calendar_api: 100
    calendar_api_burst: 5

    # Min bids (POST /api/advert/v1/bids/min)
    # Swagger: 20 req/min, burst 5 — was burst 3
    min_bids: 20
    min_bids_burst: 5
    min_bids_api: 20
    min_bids_api_burst: 5

  adaptive_probe_after: 15
  max_backoff_seconds: 60

# Storage backend (V2 dual-backend)
storage:
  backend: sqlite          # sqlite | postgres
  # db_path is inherited from promotion_v2.db_path for backward compat
  # For PostgreSQL:
  # backend: postgres
  # pg_host: "10.120.24.155"
  # pg_port: 5432
  # pg_user: "arm_ai_admin"
  # pg_database: "wb_data_prod"
