wb:
  api_key_env: WB_API_ANALYTICS_AND_PROMO_KEY

stock_history:
  report_type: daily
  stock_type: ""
  days: 90
  resume: true
  rate_limits:
    create: 3
    create_burst: 3
    create_api: 3
    create_api_burst: 3
    status_check: 3
    status_check_burst: 3
    status_check_api: 3
    status_check_api_burst: 3
    download: 3
    download_burst: 3
    download_api: 3
    download_api_burst: 3
  poll_interval_sec: 30
  poll_timeout_min: 30
  adaptive_probe_after: 0
  max_backoff_seconds: 300

storage:
  backend: sqlite
  db_path: /var/db/wb-sales.db
  pg_dsn: ""
  pg_database: "wb_data_prod"
  pg_password_env: "PG_PWD"
