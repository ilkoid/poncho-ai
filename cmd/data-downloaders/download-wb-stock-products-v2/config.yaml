# WB Stock Products Downloader v2 — Configuration
# Endpoint: POST /api/v2/stocks-report/products/products
# Rate limit: 3 req/min (shared with other stocks-report/search-report endpoints)

wb:
  api_key_env: "WB_API_ANALYTICS_AND_PROMO_KEY"
  timeout: "120s"

stock_products:
  page_size: 1000        # max items per API request (API max: 1000)
  days: 1                # default period (snapshot = yesterday)
  rate_limits:
    stock_products: 3        # desired rate (req/min)
    stock_products_burst: 3
    stock_products_api: 3    # swagger rate (recovery floor)
    stock_products_api_burst: 3
  adaptive_probe_after: 10
  max_backoff_seconds: 60

storage:
  backend: "postgres"
#  db_path: "/var/db/wb-sales-tmp.db"
  pg_database: "wb_data_test"
  pg_password_env: "PG_PWD"
