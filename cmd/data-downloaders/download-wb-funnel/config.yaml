wb:
  analytics_api_key: ${WB_API_ANALYTICS_AND_PROMO_KEY}
  timeout: 30m

funnel:
  days: 3
  batch_size: 20
#  rate_limit: 4    # Legacy (для совместимости)
#  burst: 3         # Legacy (для совместимости)
  # Adaptive rate limiting (двухуровневый, см. dev_limits.md)
  funnel_rate_limit: 3         # desired — пробуем 5 req/min (> swagger 3)
  funnel_rate_limit_burst: 3
  funnel_rate_limit_api: 3     # api floor — восстановление после 429 (swagger: 3)
  funnel_rate_limit_api_burst: 3
  # Adaptive tuning
  # adaptive_recover_after: 5   # DEPRECATED — limiter drops to api floor immediately on 429
  adaptive_probe_after: 10     # OKs на api floor перед пробой desired
  max_backoff_seconds: 60      # Cap для wait time после 429
#  from: "2026-03-12"         # Опционально: YYYY-MM-DD (приоритет над days)
#  to: "2026-03-12"           # Опционально: YYYY-MM-DD (приоритет над days)
  max_batches: 0   # 0 = загрузить все батчи (полезно для тестов)

storage:
  db_path: "/home/ilkoid/go-workspace/src/poncho-ai/db/wb-sales.db"
  funnel_refresh_window: 4         # Дней для обновления

# Фильтрация товаров по артикулу (supplier_article)
filter:
  # Исключить старые 6-значные артикулы
  exclude_lengths: [6]
  # Только товары 2025-2026 года (извлекается из 2-3 цифры артикула)
  # Например: 12621749 → год "26" (2026), 32311215 → год "23" (2023)
  allowed_years: [24, 25, 26]
