wb:
  analytics_api_key: ${WB_API_ANALYTICS_AND_PROMO_KEY}
  timeout: 30m

funnel:
  days: 7
  batch_size: 20
  rate_limit: 4    # Запросов в минуту (WB Analytics API default: 3)
  burst: 3         # Burst для rate limiter
#  from: "2026-03-12"         # Опционально: YYYY-MM-DD (приоритет над days)
#  to: "2026-03-12"           # Опционально: YYYY-MM-DD (приоритет над days)
  max_batches: 0   # 0 = загрузить все батчи (полезно для тестов)

storage:
  db_path: "/home/ilkoid/go-workspace/src/poncho-ai/db/wb-sales.db"
  funnel_refresh_window: 4         # Дней для обновления
