# WB Feedbacks Downloader Configuration
# Downloads feedbacks and questions from WB Feedbacks API

# WB API Settings
wb:
  # API Key (override with WB_API_FEEDBACK_KEY or WB_API_KEY env var)
  api_key: ""
  # Request timeout
  timeout: 30s

# Download Settings
feedbacks:
  # Database path (SQLite)
  # db_path: "/home/ilkoid/go-workspace/src/poncho-ai/db/wb-sales.db"
  db_path: "/home/ilkoid/go-workspace/src/poncho-ai/db/wb-cards.db"

  # Date range (alternative to --days flag)
  begin: ""  # YYYY-MM-DD
  end: ""    # YYYY-MM-DD

  # Days from today (alternative to begin/end)
  days: 30

  # What to download (set to false to skip)
  feedbacks: true   # download feedbacks
  questions: true   # download questions

  # Rate limits per endpoint (requests per minute)
  # Feedbacks API: 3 req/sec (180 req/min), burst 6
  # desired: rate you want (can exceed api — adaptive limiter handles 429)
  # api:      swagger-documented rate (recovery floor after 429)
  # burst:    max simultaneous requests
  # If desired not set → defaults to api (safe, no exceeding swagger)
  rate_limits:
    # /api/v1/feedbacks (3 req/sec)
    download_feedbacks: 180
    download_feedbacks_burst: 6
    download_feedbacks_api: 180
    download_feedbacks_api_burst: 6

    # /api/v1/questions (3 req/sec)
    download_questions: 180
    download_questions_burst: 6
    download_questions_api: 180
    download_questions_api_burst: 6

  # Adaptive rate limiting tuning (see dev_limits.md)
  # probe_after:   consecutive OKs at api floor before probing desired
  # max_backoff:   cap for cooldown time (seconds)
  adaptive_probe_after: 10
  max_backoff_seconds: 60
