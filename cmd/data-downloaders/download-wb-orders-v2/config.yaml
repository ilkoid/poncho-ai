wb:
  api_key_env: "WB_STAT"           # env var with WB Statistics API key
  rate_limit: 1
  burst_limit: 10
  endpoint: "https://statistics-api.wildberries.ru"

orders:
  days: 89                     # дней от вчерашнего (default: 90, retention WB API)
  # from: "2026-03-01"         # точная начальная дата (приоритет над days)
  # to: "2026-06-01"           # точная конечная дата (приоритет над days)
  rewrite: true                # удалить старые данные за период перед загрузкой
  adaptive_recover_after: 5    # OKs before restore to api floor after 429
  adaptive_probe_after: 10     # OKs at api floor before probing desired rate
  max_backoff_seconds: 60      # cap for exponential backoff

storage:
  backend: "postgres"
  db_path: "/var/db/wb-sales.db"

filter:
  exclude_lengths: [6]         # исключить 6-значные артикулы (non-unique)
  allowed_years: [20, 21, 22, 23, 24, 25, 26]  # фильтр по году из артикула
