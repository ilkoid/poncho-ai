wb:
  api_key: ${WB_STAT}
  analytics_api_key: ${WB_API_ANALYTICS_AND_PROMO_KEY}
  rate_limit: 1
  burst: 2
  endpoint: https://statistics-api.wildberries.ru
  timeout: 30m

# Sales download settings (used by default, without --funnel flag)
# Priority: CLI flags (--days/--begin/--end) > download.days > download.from/to
download:
  days: 7                        # Load last 7 days (alternative to from/to, default: 7)
  # from: "2026-03-01T00:00:00+03:00"  # Start date (YYYY-MM-DD or RFC3339) - overridden by days
  # to: "2026-03-26T23:59:59+03:00"    # End date (YYYY-MM-DD or RFC3339) - overridden by days
  resume: false

  # Adaptive tuning
  adaptive_recover_after: 5      # OKs to restore to api floor after 429
  adaptive_probe_after: 10       # OKs at api floor before probing desired
  max_backoff_seconds: 60        # Cap for exponential backoff

storage:
  db_path: "/home/ilkoid/go-workspace/src/poncho-ai/db/wb-sales.db"
