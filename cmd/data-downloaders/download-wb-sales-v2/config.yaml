# config.yaml for download-wb-sales-v2 (uses new pkg/sales library)
# Этот файл критически важен для тестирования v2.

wb:
  api_key: ${WB_STAT}
  analytics_api_key: ${WB_API_ANALYTICS_AND_PROMO_KEY}
  rate_limit: 100
  burst_limit: 5
  endpoint: https://statistics-api.wildberries.ru
  timeout: 30m

# Sales download settings
download:
  days: 1                        # Quick v2 validation
  resume: false
  rewrite: false
  skip_service_records: false

  adaptive_recover_after: 5
  adaptive_probe_after: 10
  max_backoff_seconds: 60

storage:
  db_path: "/tmp/wb-sales-v2-test.db"
  backend: "sqlite"             # "sqlite" | "postgres"
  pg_database: "wb_data_prod"   # PostgreSQL database name
  pg_password_env: "PG_PWD"     # env var with PG password
