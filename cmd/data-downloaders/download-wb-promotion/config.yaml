# WB Promotion Downloader Configuration
# Downloads campaign data from WB Promotion API

# WB API Settings
wb:
  # API Key (override with WB_API_KEY env var)
  api_key: ""
  # Analytics/Promotion API Key (override with WB_API_ANALYTICS_AND_PROMO_KEY)
  analytics_api_key: ""
  # Rate limit: requests per minute
  #rate_limit: 20  # 3 req/min for Promotion API
  # Burst capacity
  #burst: 2
  # Request timeout
  timeout: 120s

# Promotion Download Settings
promotion:
  # Database path (SQLite)
  db_path: "/home/ilkoid/go-workspace/src/poncho-ai/db/wb-sales.db"

  # Date range (alternative to --days flag)
  #begin: "2026-01-01"  # YYYY-MM-DD
  #end: "2026-01-02"    # YYYY-MM-DD

  # Days from today (alternative to begin/end)
  days: 14

  # Filter by campaign status (comma-separated: 9,11 = active + paused)
  # -1 = deleted, 4 = ready, 7 = finished, 8 = canceled, 9 = active, 11 = paused
  statuses: [7,9,11]

  # Resume mode: continue from last loaded date
  resume: false # true

  # Skip downloading campaign details (name, payment_type, placements)
  # Saves ~35s for 8800+ campaigns. Use when you only need stats numbers.
  skip_details: false

  # Skip loading campaign list from /adv/v1/promotion/count (reuse IDs from DB)
  # Use when campaigns are already in DB and you only need to update details or stats.
  skip_campaigns: false

  # Skip downloading stats from /adv/v3/fullstats
  # Use when you only need to update campaign details.
  skip_stats: false

  # Rate limits per endpoint (requests per minute)
  # desired: rate you want (can exceed api — adaptive limiter handles 429)
  # api:      swagger-documented limit (recovery floor after 429)
  # burst:    max simultaneous requests
  # If desired not set → defaults to api (safe, no exceeding swagger)
  rate_limits:
    # /adv/v1/promotion/count (5 req/sec)
    promotion_count: 300
    promotion_count_burst: 10
    promotion_count_api: 300
    promotion_count_api_burst: 5
    # /api/advert/v2/adverts (5 req/sec)
    advert_details: 300
    advert_details_burst: 10
    advert_details_api: 300
    advert_details_api_burst: 5
    # /adv/v3/fullstats
    # Swagger says: 3 req/min, but "global limiter per seller" is stricter in practice
    # Real limit: 2 req/min (30s interval) to avoid 429 errors
    fullstats: 3
    fullstats_burst: 1
    fullstats_api: 3           # practical limit (swagger says 3, but 429 occurs)
    fullstats_api_burst: 1

  # Adaptive rate limiting tuning (see dev_limits.md)
  # recover_after: DEPRECATED — limiter drops to api floor immediately on 429
  # probe_after:   consecutive OKs at api floor before probing desired again
  # max_backoff:   cap for wait time after 429 (seconds)
  # adaptive_recover_after: 10  # DEPRECATED — no longer used
  adaptive_probe_after: 15
  max_backoff_seconds: 30
