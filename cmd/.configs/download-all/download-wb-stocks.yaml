wb:
  api_key: "WB_API_ANALYTICS_AND_PROMO_KEY"
  timeout: "60s"

stocks:
  db_path: "/var/db/wb-sales.db"
  first_date: "2026-05-10"
  api_key_env: "WB_API_KEY"
  rate_limits:
    warehouse: 3
    warehouse_burst: 1
    warehouse_api: 3
    warehouse_api_burst: 1
  adaptive_probe_after: 10
  max_backoff_seconds: 60
