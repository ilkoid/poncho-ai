wb:
  api_key: ""
  timeout: 30s

prices:
  db_path: "/var/db/wb-sales.db"
  api_key_env: "WB_API_KEY"
  rate_limits:
    prices_list: 100
    prices_list_burst: 5
    prices_list_api: 100
    prices_list_api_burst: 5
  adaptive_probe_after: 10
  max_backoff_seconds: 60

storage:
  backend: "postgres"
  db_path: "/var/db/wb-sales.db"
  pg_dsn: ""
  pg_database: "wb_data_prod"
  pg_password_env: "PG_PWD"
