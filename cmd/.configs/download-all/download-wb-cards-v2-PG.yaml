# WB Cards Downloader v2 — pipeline config for download-all-v2.sh
# Uses V2StorageConfig for dual-backend support.

wb:
  api_key: ""                # Прямой API ключ (пусто — берётся из env)
  analytics_api_key: ""
  calendar_api_key: ""
  base_url: ""
  rate_limit: 100            # Базовый rate limit
  burst: 5
  timeout: "60s"
  endpoint: ""

cards:
  api_key_env: "WB_API_CONTENT_KEY"  # Env var с API ключом Content API
  rate_limit: 100            # Запросов в минуту (swagger: 100/min)
  burst_limit: 5             # Burst для rate limiter
  adaptive_probe_after: 10   # OKs перед probe desired rate после 429
  max_backoff_seconds: 60    # Максимальный backoff при 429

# Хранение — выбор бэкенда
storage:
  backend: "postgres"          # "sqlite" (pipeline default) | "postgres"
  db_path: "/var/db/wb-sales.db"
  pg_dsn: ""
  pg_database: "wb_data_prod"
  pg_password_env: "PG_PWD"
