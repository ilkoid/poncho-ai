wb:
  analytics_api_key: ${WB_API_ANALYTICS_AND_PROMO_KEY}
  timeout: 30m

funnel:
  days: 7
  batch_size: 20
  funnel_rate_limit: 2
  funnel_rate_limit_burst: 3
  funnel_rate_limit_api: 2
  funnel_rate_limit_api_burst: 3
  adaptive_probe_after: 10
  max_backoff_seconds: 60
  max_batches: 0
  incremental_hours: 4  # Skip products loaded in last N hours (0 = load all)

storage:
  db_path: "/var/db/wb-sales.db"
  funnel_refresh_window: 2

filter:
  exclude_lengths: [6]
  allowed_years: []
  active_days: 90  # Only products with sales in last N days (0 = no filter)
