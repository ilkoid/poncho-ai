wb:
  api_key_env: "WB_API_ANALYTICS_AND_PROMO_KEY"
  timeout: "60s"

wh_remains:
  db_path: "/var/db/wb-sales.db"
  api_key_env: "WB_API_ANALYTICS_AND_PROMO_KEY"
  rate_limits:
    create: 1
    create_burst: 5
    create_api: 1
    create_api_burst: 5
    status: 12
    status_burst: 5
    status_api: 12
    status_api_burst: 5
    download: 1
    download_burst: 1
    download_api: 1
    download_api_burst: 1
  poll_interval_sec: 30
  poll_timeout_min: 30
  group_by_nm: true
  group_by_size: true

storage:
  backend: "sqlite"
  db_path: "/var/db/wb-sales.db"
  pg_dsn: ""
  pg_database: "wb_data_prod"
  pg_password_env: "PG_PWD"
