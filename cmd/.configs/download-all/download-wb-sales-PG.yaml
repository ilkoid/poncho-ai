wb:
  api_key: ${WB_STAT}
  analytics_api_key: ${WB_API_ANALYTICS_AND_PROMO_KEY}
  rate_limit: 1
  burst: 2
  endpoint: https://statistics-api.wildberries.ru
  timeout: 30m

download:
  days: 7
  resume: false
  rewrite: true
  adaptive_recover_after: 5
  adaptive_probe_after: 10
  max_backoff_seconds: 60

filter:
  exclude_lengths: [6]
  allowed_years: []

storage:
  backend: "postgres"
  db_path: "/var/db/wb-sales.db"
  pg_dsn: ""
  pg_database: "wb_data_prod"
  pg_password_env: "PG_PWD"
