<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 360px; font: 13px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 12px; }
      h1 { font-size: 15px; margin: 0 0 10px; }
      .modes { display: flex; gap: 6px; margin-bottom: 10px; }
      .modes button { flex: 1; padding: 6px; cursor: pointer; border: 1px solid #ccc; background: #f7f7f7; border-radius: 4px; }
      .modes button.active { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }
      label { display: block; font-weight: 600; margin: 8px 0 3px; }
      input, textarea { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font: inherit; }
      textarea { height: 96px; resize: vertical; }
      .hint { color: #666; font-size: 11px; margin-top: 3px; }
      .row { display: flex; gap: 6px; margin-top: 10px; }
      .row button { flex: 1; padding: 7px; cursor: pointer; border: 0; border-radius: 4px; font-weight: 600; }
      .primary { background: #2b6cb0; color: #fff; }
      .ghost { background: #eee; color: #333; }
      .danger { background: #e53e3e; color: #fff; }
      .status { margin-top: 12px; padding: 8px; background: #f0f4f8; border-radius: 4px; font-size: 12px; }
      .status .ok { color: #2f855a; font-weight: 600; }
      .status .warn { color: #c53030; font-weight: 600; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <h1>WB Scraper</h1>

    <div class="modes">
      <button id="modeRecon" class="active">Recon (разведка)</button>
      <button id="modeCollect">Collect (сбор)</button>
    </div>

    <!-- RECON -->
    <div id="reconPanel">
      <label for="reconUrl">Стартовый URL (откроется новая вкладка)</label>
      <input id="reconUrl" type="url" placeholder="https://www.wildberries.ru/catalog/17401163/detail.aspx" />
      <div class="hint">Открой и кликай по странице сам — расширение запишет все запросы к *.wb.ru.</div>
      <div class="row">
        <button id="reconOpen" class="primary">Открыть</button>
      </div>
    </div>

    <!-- COLLECT -->
    <div id="collectPanel" class="hidden">
      <label for="collectEndpoint">Коллектор (Go-сервер)</label>
      <input id="collectEndpoint" type="text" placeholder="http://127.0.0.1:7780" />
      <div class="hint">Pull целей отсюда и push перехватов сюда. Пустое поле целей ниже → режим pull.</div>

      <label for="collectTargets">Цели (по строке, опц.): nmId или поисковый запрос</label>
      <textarea id="collectTargets" placeholder="17401163&#10;футболки для мальчика набор однотонные&#10;https://www.wildberries.ru/brands/le-and-lo"></textarea>
      <div class="hint">Пусто → pull с сервера. Заполнено → только эти цели (без сервера). Паузы 1-3с.</div>
      <div class="row">
        <button id="collectStart" class="primary">Старт</button>
        <button id="collectStop" class="danger">Стоп</button>
      </div>
    </div>

    <div class="row">
      <button id="export" class="ghost">Экспорт JSON</button>
      <button id="clear" class="ghost">Очистить буфер</button>
    </div>

    <div class="status" id="serverStatus">Go: —</div>
    <div class="status" id="status">…</div>

    <script src="popup.js"></script>
  </body>
</html>
