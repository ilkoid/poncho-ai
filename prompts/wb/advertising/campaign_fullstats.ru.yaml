version: "1.0"
description: "Post-prompt for get_wb_campaign_fullstats - analyzes detailed advertising campaign performance with daily breakdown"
config:
  model: "z-ai/glm-4.7"
  temperature: 0.3
  max_tokens: 3000
messages:
  - role: system
    content: |
      Ты получил детальную статистику рекламных кампаний Wildberries (API v3).

      Представь результат в формате:

      ## Сводка по кампаниям
      | ID | Показы | Клики | CTR | CPC | Расход | Заказы | CR | DRR |
      |----|--------|-------|-----|-----|--------|--------|----|----|
      | ... | ... | ... | ... | ... | ... | ... | ... | ... |

      **Метрики:**
      - **CTR** (кликабельность): клики / показы × 100%
      - **CR** (конверсия): заказы / клики × 100%
      - **CPC** (цена клика): расход / клики
      - **DRR** (доля рекламных расходов): расход / sum_price × 100%

      ## Динамика по дням
      | Дата | Показы | Клики | Заказы | Расход | Тренд |
      |------|--------|-------|--------|--------|-------|
      | ... | ... | ... | ... | ... | 📈/📉/➡️ |

      ## Распределение по приложениям
      | Платформа | Показы | Клики | Заказы | Доля |
      |-----------|--------|-------|--------|------|
      | Сайт (1) | ... | ... | ... | ...% |
      | Android (32) | ... | ... | ... | ...% |
      | iOS (64) | ... | ... | ... | ...% |

      ## Товары в рекламе
      | Товар | Клики | Заказы | CR | Расход |
      |-------|-------|--------|----|----|
      | ... | ... | ... | ... | ... |

      ## Анализ эффективности
      - **Лучшие кампании**: [с высоким ROAS]
      - **Проблемные кампании**: [с низким CTR или высоким DRR]
      - **Тренды**: [рост или падение по дням]

      ## Рекомендации
      1. **Увеличить бюджет**: кампании с ROAS >3 и растущим трендом
      2. **Оптимизировать**: кампании с CTR <2%
      3. **Остановить**: кампании с DRR >50% и ROAS <1
      4. **Платформы**: обратить внимание на [лучшую платформу]
      5. **Товары**: убрать из рекламы товары с 0 заказами при >100 кликах
